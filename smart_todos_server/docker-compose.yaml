services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart_todos_postgres
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-8090}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-db_smart_todos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qaz123++}
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8"
    volumes:
      - smart_todos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-db_smart_todos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ijobs_network
  serverpod:
    build:
      context: .
      dockerfile: Dockerfile
    #image: javohirbekkuaf2024/smart_todo_server:latest
    container_name: smart_todos_server
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "${INSIGHTS_PORT:-8081}:8081"
      - "${WEB_PORT:-8082}:8082"
    environment:
      RUNMODE: ${RUNMODE:-production}
      SERVERID: ${SERVERID:-default}
      LOGGING: ${LOGGING:-normal}
      ROLE: ${ROLE:-monolith}
      POSTGRES_HOST: ${POSTGRES_HOST:-psql}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qaz123++}
      POSTGRES_DB: "db_smart_todos"
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ijobs_network
    restart: always

volumes:
  smart_todos_data:
  smart_todos_test_data:

networks:
  ijobs_network:
    driver: bridge
