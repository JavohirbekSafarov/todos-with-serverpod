  #   ports:
  #     - "8091:6379"
  #   command: redis-server --requirepass ${REDIS_PASSWORD:-F-oSgDwj4n7w1M4j_q25zT1HDurQMc6c}
  #   volumes:
  #     - smart_todos_redis_data:/data
  #   networks:
  #     - ijobs_network

  # Serverpod Server
  serverpod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_todos_server
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "${INSIGHTS_PORT:-8081}:8081"
      - "${WEB_PORT:-8082}:8082"
    environment:
      RUNMODE: ${RUNMODE:-production}
      SERVERID: ${SERVERID:-default}
      LOGGING: ${LOGGING:-normal}
      ROLE: ${ROLE:-monolith}
      POSTGRES_HOST: ${POSTGRES_HOST:-pgsql}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qaz123++}
      POSTGRES_DB: ${POSTGRES_DB:-db_smart_todos}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ijobs_network
    restart: always

volumes:
  smart_todos_data:
  smart_todos_test_data:
  # smart_todos_redis_data:

networks:
  ijobs_network:
    driver: bridge
